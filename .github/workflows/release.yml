name: release

# Run GoReleaser on every pushed semver tag (e.g. `git tag v1.2.3 && git push --tags`).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the GitHub Release and upload artifacts

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so the changelog and version resolve

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Run tests
        run: go test -race ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # The NetworkManager plugin is a separate (nested, non-CGO-free) module whose
  # editor .so and auth-dialog are C linked against libnm/GTK, so it isn't part
  # of the GoReleaser pipeline. Build its .deb/.rpm here and attach them to the
  # Release that GoReleaser just created. amd64 only: the C parts link against
  # host libnm/GTK, and the desktop this targets is amd64.
  nm-packages:
    needs: goreleaser
    # Pin to the oldest supported LTS: the editor .so and auth-dialog link
    # against the host's GLib/GTK, and GLib symbols are NOT version-scoped, so a
    # binary built on a newer GLib can pull in symbols absent on older systems
    # (e.g. g_once_init_enter_pointer, GLib >= 2.80, which crashes the loader on
    # GLib 2.72 / Ubuntu 22.04 / Pop!_OS 22.04). Build on the baseline so the
    # released package loads everywhere from that GLib up.
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: nm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: nm/go.sum

      - name: Install editor/auth-dialog build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libnm-dev libnma-dev libgtk-3-dev libglib2.0-dev

      - name: Build packages (.deb/.rpm)
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          # Strip the leading "v" so the package version is bare semver.
          make packages VERSION="${GITHUB_REF_NAME#v}" PKG_ARCH=amd64 \
            NFPM="$(go env GOPATH)/bin/nfpm"

      - name: Attach packages to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" bin/pkg/*.deb bin/pkg/*.rpm --clobber

  # Signed APT repository on GitHub Pages, so Debian/Ubuntu users can
  # `apt install veepin veepin-nm` and track releases with `apt upgrade`.
  # Stateless: rebuilt from this release's .debs only (older versions stay on
  # GitHub Releases). Needs the APT_SIGNING_KEY secret (armored GPG private
  # key) and Pages enabled; configure-pages creates the site on first run.
  apt-repo:
    needs: [goreleaser, nm-packages]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download this release's debs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${GITHUB_REF_NAME}" -p '*.deb' -D debs

      - name: Import the repository signing key
        env:
          APT_SIGNING_KEY: ${{ secrets.APT_SIGNING_KEY }}
        run: |
          if [ -z "$APT_SIGNING_KEY" ]; then
            echo "::error::APT_SIGNING_KEY secret is not set; refusing to publish an unsigned repo"
            exit 1
          fi
          printf '%s' "$APT_SIGNING_KEY" | gpg --batch --import

      - name: Build the signed repository
        run: .github/scripts/build-apt-repo.sh debs site

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
