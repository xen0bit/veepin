name: release

# Run GoReleaser on every pushed semver tag (e.g. `git tag v1.2.3 && git push --tags`).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the GitHub Release and upload artifacts

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so the changelog and version resolve

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Run tests
        run: go test -race ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # The NetworkManager plugin is a separate (nested, non-CGO-free) module whose
  # editor .so and auth-dialog are C linked against libnm/GTK, so it isn't part
  # of the GoReleaser pipeline. Build its .deb/.rpm here and attach them to the
  # Release that GoReleaser just created. This job covers the architectures
  # with native runners (amd64, arm64); nm-packages-cross below covers the
  # rest.
  nm-packages:
    needs: goreleaser
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-22.04, pkg_arch: amd64 }
          - { runner: ubuntu-22.04-arm, pkg_arch: arm64 }
    # Pin to the oldest supported LTS: the editor .so and auth-dialog link
    # against the host's GLib/GTK, and GLib symbols are NOT version-scoped, so a
    # binary built on a newer GLib can pull in symbols absent on older systems
    # (e.g. g_once_init_enter_pointer, GLib >= 2.80, which crashes the loader on
    # GLib 2.72 / Ubuntu 22.04 / Pop!_OS 22.04). Build on the baseline so the
    # released package loads everywhere from that GLib up.
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        working-directory: nm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: nm/go.sum

      - name: Install editor/auth-dialog build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libnm-dev libnma-dev libgtk-3-dev libglib2.0-dev

      - name: Build packages (.deb/.rpm)
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          # Strip the leading "v" so the package version is bare semver.
          make packages VERSION="${GITHUB_REF_NAME#v}" PKG_ARCH=${{ matrix.pkg_arch }} \
            NFPM="$(go env GOPATH)/bin/nfpm"

      - name: Attach packages to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" bin/pkg/*.deb bin/pkg/*.rpm --clobber

  # Cross-built veepin-nm for the Debian release architectures without native
  # runners. The C parts (editor .so, auth-dialog) need the TARGET's libnm/GTK
  # dev libraries, which no Ubuntu runner can provide for foreign arches —
  # Debian's archive carries every release architecture in one repository, so a
  # Debian container plus `dpkg --add-architecture` gives real cross toolchains
  # AND target dev libs, no emulation. The Go service cross-compiles natively
  # (CGO-free). Baseline: bookworm (GLib 2.74), so binaries load on Debian 12+
  # / Ubuntu 24.04+; riscv64 builds on trixie only because riscv64 is not a
  # bookworm release architecture (riscv64 users run trixie or newer anyway).
  # Runs in parallel with goreleaser; the upload job below waits for both.
  nm-packages-cross:
    runs-on: ubuntu-latest
    container: debian:${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: armhf, image: bookworm, pkg_arch: arm7, goarch: arm, goenv: "GOARM=7" }
          - { arch: armel, image: bookworm, pkg_arch: arm5, goarch: arm, goenv: "GOARM=5" }
          # GO386=softfloat: Debian's i386 baseline does not include SSE2,
          # which Go's default GO386=sse2 would require.
          - { arch: i386, image: bookworm, pkg_arch: "386", goarch: "386", goenv: "GO386=softfloat" }
          - { arch: ppc64el, image: bookworm, pkg_arch: ppc64le, goarch: ppc64le, goenv: "" }
          - { arch: s390x, image: bookworm, pkg_arch: s390x, goarch: s390x, goenv: "" }
          - { arch: riscv64, image: trixie, pkg_arch: riscv64, goarch: riscv64, goenv: "" }
    steps:
      - name: Install cross toolchain and target dev libraries
        run: |
          dpkg --add-architecture ${{ matrix.arch }}
          apt-get update
          apt-get install -y --no-install-recommends \
            make dpkg-dev crossbuild-essential-${{ matrix.arch }} pkg-config \
            ca-certificates git \
            libnm-dev:${{ matrix.arch }} libnma-dev:${{ matrix.arch }} \
            libgtk-3-dev:${{ matrix.arch }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: false # actions/cache needs zstd, absent in the container

      - name: Build packages (.deb/.rpm)
        working-directory: nm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          # Derive the GNU triplet (cross gcc prefix) and multiarch directory
          # (target pkg-config path) from the Debian architecture name.
          triplet="$(dpkg-architecture -a${{ matrix.arch }} -qDEB_HOST_GNU_TYPE 2>/dev/null)"
          multiarch="$(dpkg-architecture -a${{ matrix.arch }} -qDEB_HOST_MULTIARCH 2>/dev/null)"
          export GOARCH=${{ matrix.goarch }} ${{ matrix.goenv }}
          export PKG_CONFIG_LIBDIR="/usr/lib/$multiarch/pkgconfig:/usr/lib/pkgconfig:/usr/share/pkgconfig"
          make packages VERSION="${GITHUB_REF_NAME#v}" PKG_ARCH=${{ matrix.pkg_arch }} \
            CC="$triplet-gcc" NFPM="$(go env GOPATH)/bin/nfpm"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nm-${{ matrix.arch }}
          path: |
            nm/bin/pkg/*.deb
            nm/bin/pkg/*.rpm

  # Attach the cross-built packages to the release (the container jobs above
  # have no gh CLI; a stock runner does).
  nm-cross-upload:
    needs: [goreleaser, nm-packages-cross]
    runs-on: ubuntu-latest
    steps:
      - name: Download cross-built packages
        uses: actions/download-artifact@v4
        with:
          pattern: nm-*
          merge-multiple: true
          path: pkgs

      - name: Attach packages to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${GITHUB_REF_NAME}" pkgs/*.deb pkgs/*.rpm --clobber

  # Signed APT repository on GitHub Pages, so Debian/Ubuntu users can
  # `apt install veepin veepin-nm` and track releases with `apt upgrade`.
  # Stateless: rebuilt from this release's .debs only (older versions stay on
  # GitHub Releases). Needs the APT_SIGNING_KEY secret (armored GPG private
  # key) and Pages enabled; configure-pages creates the site on first run.
  apt-repo:
    needs: [goreleaser, nm-packages, nm-cross-upload]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download this release's debs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download "${GITHUB_REF_NAME}" -p '*.deb' -D debs

      - name: Import the repository signing key
        env:
          APT_SIGNING_KEY: ${{ secrets.APT_SIGNING_KEY }}
        run: |
          if [ -z "$APT_SIGNING_KEY" ]; then
            echo "::error::APT_SIGNING_KEY secret is not set; refusing to publish an unsigned repo"
            exit 1
          fi
          printf '%s' "$APT_SIGNING_KEY" | gpg --batch --import

      - name: Build the signed repository
        run: .github/scripts/build-apt-repo.sh debs site

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
