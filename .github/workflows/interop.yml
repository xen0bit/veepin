name: interop

# Docker-based interoperability tests: every protocol against a real third-party
# peer and against itself. Kept in its own workflow — like nm.yml — so the
# toolchain-light core jobs never pull in Docker or the peer images. Path-filtered
# to the code that affects a data path or handshake so it does not run on
# unrelated changes.
on:
  # Manual trigger, so a suspected flake can be re-run on demand without pushing
  # a commit. The interop suite talks to real peers over Docker, so an
  # intermittent failure is best characterised by running it repeatedly.
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "internal/**"
      - "dataplane/**"
      - "client/**"
      - "cmd/veepin/**"
      # One entry per public protocol package: a change confined to any of them
      # can break that protocol's interop cells and nothing else would catch it.
      - "ikev2/**"
      - "wireguard/**"
      - "openvpn/**"
      - "sstp/**"
      - "ssh/**"
      - "l2tp/**"
      - "anyconnect/**"
      - "nebula/**"
      - "masque/**"
      - "fortinet/**"
      - "toy/**"
      - "Dockerfile"
      - "tests/interop/**"
      - "cmd/livingreadme/**"
      - ".github/scripts/living-readme-commit.sh"
      - ".github/scripts/living-readme-preview.sh"
      - ".github/workflows/interop.yml"
  pull_request:
    branches: [main]
    paths:
      - "internal/**"
      - "dataplane/**"
      - "client/**"
      - "cmd/veepin/**"
      # One entry per public protocol package: a change confined to any of them
      # can break that protocol's interop cells and nothing else would catch it.
      - "ikev2/**"
      - "wireguard/**"
      - "openvpn/**"
      - "sstp/**"
      - "ssh/**"
      - "l2tp/**"
      - "anyconnect/**"
      - "nebula/**"
      - "masque/**"
      - "fortinet/**"
      - "toy/**"
      - "Dockerfile"
      - "tests/interop/**"
      - "cmd/livingreadme/**"
      - ".github/scripts/living-readme-commit.sh"
      - ".github/scripts/living-readme-preview.sh"
      - ".github/workflows/interop.yml"

concurrency:
  group: interop-${{ github.ref }}
  cancel-in-progress: true

# contents:write so the push-to-main run can commit the refreshed interop matrix
# back into the README (the "living README"). Pull-request runs only preview the
# diff, so the elevated scope is unused there.
permissions:
  contents: write

jobs:
  interop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the commit-back step can rebase onto a main that may
          # have moved (e.g. the benchmark workflow pushing its own region).
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Enable TUN + IPsec kernel modules
        run: |
          # The veepin containers need /dev/net/tun; strongSwan uses kernel XFRM.
          sudo modprobe tun || true
          sudo modprobe esp4 xfrm_user af_key || true
          ls -l /dev/net/tun

      - name: Run interop tests (vs strongSwan, over Docker)
        run: |
          # -json so the living-README tool can read the per-cell pass/fail; tee
          # keeps the raw stream in the log. pipefail makes go test's exit code
          # (not tee's) fail the job, so the commit-back steps below run only when
          # every cell passed.
          set -o pipefail
          go test -tags interop -json -count=1 -timeout 30m ./tests/interop/... | tee interop.json

      # One interop run feeds two regions: the pass/fail matrix and the iperf3
      # throughput table (both parsed from interop.json), refreshed in one commit.
      - name: Refresh interop matrix + throughput and commit (push to main)
        if: github.event_name == 'push'
        env:
          SHA: ${{ github.sha }}
          REF: ${{ github.ref_name }}
        run: .github/scripts/living-readme-commit.sh "interop results" interop interop.json interop-benchmark interop.json

      - name: Preview interop matrix + throughput diff (pull request)
        if: github.event_name == 'pull_request'
        env:
          SHA: ${{ github.sha }}
          REF: ${{ github.ref_name }}
        run: .github/scripts/living-readme-preview.sh "interop results" interop interop.json interop-benchmark interop.json
