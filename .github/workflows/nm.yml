name: nm-plugin

# Builds and tests the nested NetworkManager plugin module. Kept separate from
# the core ci.yml so the core jobs never install a C toolchain / D-Bus and the
# root module's CGO-free, dependency-free guarantees stay isolated.
on:
  push:
    branches: [main]
    paths: ["nm/**", "client/**", ".github/workflows/nm.yml"]
  pull_request:
    branches: [main]
    paths: ["nm/**", "client/**", ".github/workflows/nm.yml"]
  # Manual trigger, so this can be re-run against the current main even when a
  # change lands outside the path filter (e.g. a root-module fix the nm module
  # depends on through its `replace ../`).
  workflow_dispatch:

concurrency:
  group: nm-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    # Match the release baseline (see release.yml): build the C editor .so /
    # auth-dialog against the oldest supported GLib so they stay loadable on it.
    # The `make editor-test` step below dlopen()s the .so, so an accidental
    # dependency on a newer GLib symbol fails CI here rather than at a user's
    # gnome-control-center.
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: nm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
          cache-dependency-path: nm/go.sum

      - name: Install D-Bus + editor/auth-dialog build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y dbus libnm-dev libnma-dev libgtk-3-dev libglib2.0-dev xvfb

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then echo "$unformatted"; exit 1; fi

      - name: Vet
        run: go vet ./...

      - name: Build (CGO-free service)
        run: make build

      - name: Test (race)
        run: go test -race ./...

      - name: Build editor plugin (.so)
        run: make editor

      - name: Test editor plugin (headless via xvfb)
        run: xvfb-run -a make editor-test

      - name: Build + test auth-dialog
        run: make authdialog authdialog-test

      - name: Build packages (.deb/.rpm)
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          make packages VERSION=0.0.0 NFPM="$(go env GOPATH)/bin/nfpm"

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: veepin-nm-packages
          path: nm/bin/pkg/*
          if-no-files-found: error
