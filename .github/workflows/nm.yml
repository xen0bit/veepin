name: nm-plugin

# Builds and tests the nested NetworkManager plugin module. Kept separate from
# the core ci.yml so the core jobs never install a C toolchain / D-Bus and the
# root module's CGO-free, dependency-free guarantees stay isolated.
on:
  push:
    branches: [main]
    paths: ["nm/**", "client/**", ".github/workflows/nm.yml"]
  pull_request:
    branches: [main]
    paths: ["nm/**", "client/**", ".github/workflows/nm.yml"]

concurrency:
  group: nm-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
          cache-dependency-path: nm/go.sum

      - name: Install D-Bus + editor build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y dbus libnm-dev libgtk-3-dev libglib2.0-dev xvfb

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then echo "$unformatted"; exit 1; fi

      - name: Vet
        run: go vet ./...

      - name: Build (CGO-free service)
        run: make build

      - name: Test (race)
        run: go test -race ./...

      - name: Build editor plugin (.so)
        run: make editor

      - name: Test editor plugin (headless via xvfb)
        run: xvfb-run -a make editor-test
