# Direction B: strongSwan client (initiator) -> ikennkt server (ikev2d).
# strongSwan forces UDP encapsulation (encap=yes in its config) since ikennkt
# only does UDP-encapsulated ESP on 4500. Data-path check: the strongSwan client
# pings 10.10.10.1 (the ikennkt server's TUN gateway) through the tunnel.
name: ikennkt-interop-b

services:
  ikennkt-server:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: ikennkt:interop
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    sysctls:
      net.ipv4.conf.all.rp_filter: "0"
      net.ipv4.conf.default.rp_filter: "0"
      net.ipv4.ip_forward: "1"
    environment:
      PSK: "interop-test-psk"
      SERVER_ID: "vpn.example.com"
      POOL: "10.10.10.0/24"
    volumes:
      - ./ikennkt/server-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

  strongswan-client:
    build:
      context: strongswan
    image: interop-strongswan
    cap_add: [NET_ADMIN]
    sysctls:
      net.ipv4.conf.all.rp_filter: "0"
      net.ipv4.conf.default.rp_filter: "0"
    depends_on: [ikennkt-server]
    volumes:
      - ./strongswan/swanctl-client.conf:/etc/swanctl/swanctl.conf:ro
      - ./strongswan/client-entrypoint.sh:/entrypoint.sh:ro
    command: ["/bin/sh", "/entrypoint.sh"]
