# Independent openconnect Fortinet client -> veepin gateway, over DTLS.
#
# The sibling of compose.fortinet.yml with the UDP data channel left on. It is
# the strongest proof veepin's DTLS channel is right: openconnect brings the TLS
# tunnel up, then attaches its own DTLS session with the GFtype cookie exchange
# and prefers it, so the ping crosses a certificate-based DTLS 1.2 session that
# veepin's from-scratch handshake and openconnect's GnuTLS both had to agree on.
#
# Data-path check: the openconnect client pings 10.40.0.1, the gateway. The test
# additionally requires openconnect to report the DTLS connection, so a silent
# fallback to TLS fails the cell rather than passing as a false green.
name: veepin-interop-fortinet-dtls

volumes:
  certs:

services:
  veepin-fortinet-server:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: veepin:interop
    cap_add: [NET_ADMIN, NET_RAW]
    devices: ["/dev/net/tun:/dev/net/tun"]
    sysctls:
      net.ipv4.ip_forward: "1"
    environment:
      USER: "alice"
      PASSWORD: "s3cret"
      POOL: "10.40.0.0/24"
    volumes:
      - ./veepin/fortinet-server-entrypoint.sh:/entrypoint.sh:ro
      - certs:/certs
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

  opnc-fortinet-client:
    build:
      context: fortinet
    image: interop-fortinet
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    depends_on: [veepin-fortinet-server]
    environment:
      SERVER: "veepin-fortinet-server"
      USER: "alice"
      PASSWORD: "s3cret"
    volumes:
      - ./fortinet/openconnect-entrypoint.sh:/entrypoint.sh:ro
      - certs:/certs
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
