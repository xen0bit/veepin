# strongSwan as the IKEv1 initiator for L2TP/IPsec (Direction B: here -> veepin
# serve l2tp). Transport mode with traffic selectors pinned to UDP/1701, so the
# SA protects exactly the L2TP datagrams xl2tpd then exchanges through it.
connections {
    l2tp {
        version = 1
        remote_addrs = veepin-l2tp-server
        proposals = aes256-sha256-modp2048
        # veepin has no raw-ESP path, so ESP must be UDP-encapsulated whether or
        # not a NAT is present. Both ends force detection; this is strongSwan's
        # half of that agreement.
        encap = yes
        rekey_time = 0
        local {
            auth = psk
        }
        remote {
            auth = psk
            id = %any
        }
        children {
            l2tp {
                mode = transport
                esp_proposals = aes256-sha256
                # In transport mode strongSwan substitutes the tunnel endpoints
                # for `dynamic`, so both selectors resolve to the two outer
                # addresses restricted to UDP/1701 — a hostname is not accepted
                # here.
                local_ts = dynamic[udp/l2tp]
                remote_ts = dynamic[udp/l2tp]
                # The entrypoint initiates explicitly (and retries while the
                # veepin server is still starting), so no start_action here — it
                # would open a second, redundant Quick Mode for the same child.
                rekey_time = 0
            }
        }
    }
}

secrets {
    ike-l2tp {
        secret = "l2tpsecret"
    }
}
