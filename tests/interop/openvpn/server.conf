# Reference OpenVPN server: UDP, AES-256-GCM, plain TLS (no tls-auth/tls-crypt),
# no compression, topology subnet. This is the profile the veepin client targets.
dev tun
proto udp
port 1194
topology subnet
server 10.8.0.0 255.255.255.0
ca /pki/ca.crt
cert /pki/server.crt
key /pki/server.key
dh none
data-ciphers AES-256-GCM
data-ciphers-fallback AES-256-GCM
keepalive 10 60
verb 4
