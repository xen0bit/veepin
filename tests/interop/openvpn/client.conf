# Reference OpenVPN client -> veepin server. UDP, AES-256-GCM, plain TLS (no
# tls-auth), topology subnet. Proves veepin's OpenVPN responder against a real
# OpenVPN client it shares no code with.
client
dev tun
proto udp
remote veepin-ovpn-server 1194
topology subnet
ca /pki/ca.crt
cert /pki/client.crt
key /pki/client.key
remote-cert-tls server
data-ciphers AES-256-GCM
data-ciphers-fallback AES-256-GCM
keepalive 10 60
nobind
resolv-retry infinite
connect-retry 2
verb 4
