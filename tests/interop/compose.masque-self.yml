# veepin <-> veepin MASQUE CONNECT-IP over real QUIC, sockets and TUNs.
#
# The sanity check: both roles are veepin, so a failure here is a veepin break
# rather than a disagreement with the independent aioquic peer. Running it
# alongside the two cross-implementation cells is what makes a failure
# attributable -- if this passes and the others do not, veepin and the RFC have
# diverged.
#
# Data-path check: the veepin client pings 10.30.0.1, the veepin proxy's gateway,
# which crosses TUN -> capsule -> QUIC -> capsule -> TUN.
name: veepin-interop-masque-self

services:
  veepin-masque-server:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: veepin:interop
    cap_add: [NET_ADMIN, NET_RAW]
    devices: ["/dev/net/tun:/dev/net/tun"]
    sysctls:
      net.ipv4.ip_forward: "1"
    environment:
      POOL: "10.30.0.0/24"
    volumes:
      - ./veepin/masque-server-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

  veepin-masque-client:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: veepin:interop
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    depends_on: [veepin-masque-server]
    environment:
      SERVER: "veepin-masque-server"
    volumes:
      - ./veepin/masque-client-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
