# strongSwan as the IKEv1 responder for L2TP/IPsec (Direction A: veepin connect
# l2tp -> here). This is the classic road-warrior L2TP config: Main Mode with a
# PSK, then a transport-mode child SA whose traffic selectors are pinned to
# UDP/1701, so only the L2TP datagrams xl2tpd exchanges are protected.
connections {
    l2tp {
        version = 1
        proposals = aes256-sha256-modp2048
        # veepin has no raw-ESP path, so ESP must be UDP-encapsulated whether or
        # not a NAT is present. veepin forces detection from its side; this
        # forces it from strongSwan's, which is what makes the pair agree on
        # UDP/4500 on a flat container network with no NAT in the middle.
        encap = yes
        rekey_time = 0
        local {
            auth = psk
        }
        remote {
            auth = psk
            # veepin identifies by its outer IPv4 address, which DHCP on the
            # compose network assigns, so it cannot be pinned here.
            id = %any
        }
        children {
            l2tp {
                mode = transport
                esp_proposals = aes256-sha256
                local_ts = dynamic[udp/l2tp]
                remote_ts = dynamic[udp/l2tp]
                rekey_time = 0
            }
        }
    }
}

secrets {
    ike-l2tp {
        secret = "l2tpsecret"
    }
}
