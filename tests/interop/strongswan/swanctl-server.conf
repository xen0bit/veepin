# strongSwan as the IKEv2 responder (Direction A: veepin ikev2 -> here).
# Matches the one negotiable common suite with veepin (README): IKE
# aes256gcm16-prfsha256-curve25519, ESP aes256gcm16, PSK. Assigns the veepin
# client a virtual IP from rw_pool via config mode.
connections {
    rw {
        version = 2
        proposals = aes256gcm16-prfsha256-curve25519
        rekey_time = 0
        pools = rw_pool
        local {
            auth = psk
            id = vpn.example.com
        }
        remote {
            auth = psk
            id = client.example.com
        }
        children {
            rw {
                esp_proposals = aes256gcm16
                # Offer a full tunnel; the negotiated remote TS narrows to the
                # client's assigned virtual IP. 10.20.30.254 (added to lo by the
                # entrypoint) is the in-tunnel ping target for the data-path check.
                local_ts = 0.0.0.0/0
                rekey_time = 0
            }
        }
    }
}

pools {
    rw_pool {
        addrs = 10.20.30.0/24
    }
}

secrets {
    ike-rw {
        secret = "interop-test-psk"
    }
}
