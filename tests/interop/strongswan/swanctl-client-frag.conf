# strongSwan as the IKEv2 initiator with IKE fragmentation forced on (RFC 7383).
# Identical to swanctl-client.conf except `fragmentation = force`, which makes
# charon split every protected message (here the IKE_AUTH) into SKF fragments
# rather than sending it whole. Paired with a small charon.fragment_size in
# strongswan-frag.conf, the IKE_AUTH arrives at the veepin server as several
# fragments, exercising the server's reassembly path.
connections {
    ss {
        version = 2
        remote_addrs = veepin-server
        proposals = aes256gcm16-prfsha256-curve25519
        encap = yes
        fragmentation = force
        vips = 0.0.0.0
        rekey_time = 0
        local {
            auth = psk
            id = client.example.com
        }
        remote {
            auth = psk
            id = vpn.example.com
        }
        children {
            ss {
                esp_proposals = aes256gcm16
                remote_ts = 10.10.10.0/24
                start_action = trap
                rekey_time = 0
            }
        }
    }
}

secrets {
    ike-ss {
        secret = "interop-test-psk"
    }
}
