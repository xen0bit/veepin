# strongSwan as the IKEv2 initiator (Direction B: here -> ikennkt ikev2d).
# Requests a virtual IP from the ikennkt server's config-mode pool and forces
# UDP encapsulation (encap = yes) because ikennkt has no raw-ESP path — without
# a NAT in the middle strongSwan would otherwise try ESP proto-50.
connections {
    ss {
        version = 2
        remote_addrs = ikennkt-server
        proposals = aes256gcm16-prfsha256-curve25519
        encap = yes
        vips = 0.0.0.0
        rekey_time = 0
        local {
            auth = psk
            id = client.example.com
        }
        remote {
            auth = psk
            id = vpn.example.com
        }
        children {
            ss {
                esp_proposals = aes256gcm16
                # Route the ikennkt tunnel subnet through the SA; the server's
                # gateway 10.10.10.1 is the in-tunnel ping target.
                remote_ts = 10.10.10.0/24
                start_action = trap
                rekey_time = 0
            }
        }
    }
}

secrets {
    ike-ss {
        secret = "interop-test-psk"
    }
}
