# strongswan.conf with a deliberately small IKE fragment size so that even the
# compact PSK IKE_AUTH (no certificates) splits into several RFC 7383 fragments.
# Mirrors the stock Debian strongswan.conf and only adds fragment_size.
charon {
    load_modular = yes
    fragment_size = 200
    plugins {
        include strongswan.d/charon/*.conf
    }
}
include strongswan.d/*.conf
