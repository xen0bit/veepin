# strongSwan as the IKEv2 responder forcing ChaCha20-Poly1305 (RFC 7634), so the
# veepin client must negotiate it for both the IKE SA and the Child SA (Direction
# A: veepin ikev2 -> here). PSK auth; the only difference from swanctl-server.conf
# is the proposals. Proves veepin's RFC 7634 framing interoperates byte-for-byte
# with strongSwan's chacha20poly1305 implementation.
connections {
    rw {
        version = 2
        proposals = chacha20poly1305-prfsha256-curve25519
        rekey_time = 0
        pools = rw_pool
        local {
            auth = psk
            id = vpn.example.com
        }
        remote {
            auth = psk
            id = client.example.com
        }
        children {
            rw {
                esp_proposals = chacha20poly1305
                local_ts = 0.0.0.0/0
                rekey_time = 0
            }
        }
    }
}

pools {
    rw_pool {
        addrs = 10.20.30.0/24
    }
}

secrets {
    ike-rw {
        secret = "interop-test-psk"
    }
}
