# veepin WireGuard client -> veepin WireGuard server.
# The infra + both-ends-veepin sanity check: it proves the veepin initiator and
# responder agree over real sockets and a real TUN, isolating a veepin<->veepin
# break from an interop break. Data-path check: the client pings 10.10.10.1.
name: veepin-interop-wg-self

x-wg-keys: &wg-keys
  SERVER_PRIVATE: "+IRmjL6NRpthikeXn+jGUJNLe1ZJKQaqeWubiG9+GHs="
  SERVER_PUBLIC: "srb9CBWUN+UL2CYhqHoL+rGKFPNu6nUJiNStgH0EBWM="
  CLIENT_PRIVATE: "CHk+5XZnPhJ+UXfIx83SaePpgYrK+0/FqiPvNvTp3Hg="
  CLIENT_PUBLIC: "gjMMAROzi5lHFapIKeaAdJ2RhGe0lW24XysGzBd1OSM="
  PSK: "cjldFdAmi69yIFhc0Sms/5Yz6boVXkMZbMJl+RzzMZM="
  SERVER_TUN_IP: "10.10.10.1"
  CLIENT_TUN_IP: "10.10.10.2"

services:
  veepin-wg-server:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: veepin:interop
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    environment:
      <<: *wg-keys
    volumes:
      - ./veepin/wg-server-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

  veepin-wg-client:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: veepin:interop
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    depends_on: [veepin-wg-server]
    environment:
      <<: *wg-keys
      SERVER: "veepin-wg-server"
    volumes:
      - ./veepin/wg-client-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
