# veepin Fortinet client -> veepin Fortinet gateway over real TLS.
#
# The veepin<->veepin sanity check. Its value is attribution: if it passes while
# the openconnect cell fails, veepin and the FortiOS protocol have diverged
# rather than veepin being broken.
#
# Data-path check: the veepin client pings 10.40.0.1, the gateway.
name: veepin-interop-fortinet-self

services:
  veepin-fortinet-server:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: veepin:interop
    cap_add: [NET_ADMIN, NET_RAW]
    devices: ["/dev/net/tun:/dev/net/tun"]
    sysctls:
      net.ipv4.ip_forward: "1"
    environment:
      USER: "alice"
      PASSWORD: "s3cret"
      POOL: "10.40.0.0/24"
    volumes:
      - ./veepin/fortinet-server-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

  veepin-fortinet-client:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: veepin:interop
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    depends_on: [veepin-fortinet-server]
    environment:
      SERVER: "veepin-fortinet-server"
      USER: "alice"
      PASSWORD: "s3cret"
    volumes:
      - ./veepin/fortinet-client-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
