# veepin MASQUE client -> independent aioquic CONNECT-IP proxy.
#
# The peer here shares no code, no language and no QUIC/HTTP-3 stack with veepin:
# it is aioquic driven from RFC 9484/9297/9114. This cell tests veepin's
# HTTP/3 + capsule framing against a foreign implementation -- if veepin's
# varints, QPACK, SETTINGS handshake, Extended CONNECT or capsules drift from the
# RFCs, the ping stops crossing.
#
# Data-path check: the veepin client pings 10.31.0.1, the aioquic proxy's gateway.
name: veepin-interop-masque

services:
  aioquic-masque-server:
    build:
      context: masque
    image: interop-masque
    cap_add: [NET_ADMIN, NET_RAW]
    devices: ["/dev/net/tun:/dev/net/tun"]
    sysctls:
      net.ipv4.ip_forward: "1"
    environment:
      POOL_BASE: "10.31.0"
    volumes:
      - ./masque/server-entrypoint.sh:/entrypoint.sh:ro
    command: ["/bin/sh", "/entrypoint.sh"]

  veepin-masque-client:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: veepin:interop
    cap_add: [NET_ADMIN]
    devices: ["/dev/net/tun:/dev/net/tun"]
    depends_on: [aioquic-masque-server]
    environment:
      SERVER: "aioquic-masque-server"
    volumes:
      - ./veepin/masque-client-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
