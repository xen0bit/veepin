# ocserv as the reference AnyConnect responder. Password auth from a plain
# ocpasswd file, matching what the veepin client sends.
auth = "plain[passwd=/etc/ocserv/ocpasswd]"

tcp-port = 443
udp-port = 443

run-as-user = root
run-as-group = root

socket-file = /var/run/ocserv-socket
server-cert = /pki/server.crt
server-key = /pki/server.key

max-clients = 16
max-same-clients = 4

# TLS 1.3, so the RFC 5705 exporter that keys the DTLS channel is available.
# Under TLS 1.2 the exporter additionally needs Extended Master Secret (RFC 7627),
# which Go's crypto/tls rightly refuses to work without.
tls-priorities = "NORMAL:%SERVER_PRECEDENCE:%COMPAT:-VERS-SSL3.0:-VERS-TLS1.0:-VERS-TLS1.1"

# No client certificates: the veepin client authenticates with a password.
try-mtu-discovery = false
compression = false

device = vpns
ipv4-network = 10.12.0.0
ipv4-netmask = 255.255.255.0
tunnel-all-dns = false
dns = 8.8.8.8

# ocserv's own tunnel-side address is the network's first host, which is what the
# veepin client pings across the tunnel.
cisco-client-compat = true
dtls-legacy = true

# Long-lived session so the test's retry loop cannot race an expiry.
auth-timeout = 240
idle-timeout = 0
mobile-idle-timeout = 0
keepalive = 32
dpd = 90
mobile-dpd = 180
