# GoReleaser configuration for veepin.
# https://goreleaser.com  —  docs for every stanza below.
#
# Local usage:
#   goreleaser check                 # validate this file
#   goreleaser build --snapshot --clean   # build binaries without releasing
#   goreleaser release --snapshot --clean # full pipeline dry-run (no publish)
#   goreleaser release --clean            # real release (needs a git tag + GITHUB_TOKEN)
#
# This project is a pure-Go IKEv2 VPN with no cgo. NOTE: the TUN data path and
# route installation are Linux-only (other OSes compile but error at runtime),
# so releases target Linux only. The IKE/handshake code itself is portable — add
# other GOOS values below if you want handshake-only builds elsewhere.

version: 2

project_name: veepin

before:
  hooks:
    - go mod tidy
    - go vet ./...

# ---------------------------------------------------------------------------
# Builds — one entry per command (each has its own main package).
# CGO is disabled everywhere; everything is Go stdlib.
# ldflags stamp main.version/commit/date if those vars exist (harmless if not).
# ---------------------------------------------------------------------------
builds:
  - id: veepin
    binary: veepin
    main: ./cmd/veepin
    env:
      - CGO_ENABLED=0
    goos: [linux]
    # Every Debian trixie release architecture (pure Go cross-compiles them all):
    # amd64, arm64, armhf (arm7), armel (arm5, soft-float), i386, ppc64el,
    # riscv64, s390x.
    goarch: [amd64, arm64, arm, "386", ppc64le, riscv64, s390x]
    goarm: ["5", "7"]
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .CommitDate }}

# ---------------------------------------------------------------------------
# Archives — one tar.gz per OS/arch containing the veepin binary + docs.
# ---------------------------------------------------------------------------
archives:
  - id: default
    ids: [veepin]
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - README.md
      - LICENSE*
      - bench.sh

# ---------------------------------------------------------------------------
# Linux packages (.deb / .rpm / .apk) for the daemons.
# ---------------------------------------------------------------------------
nfpms:
  - id: packages
    package_name: veepin
    ids: [veepin]
    vendor: veepin
    homepage: https://github.com/xen0bit/veepin
    maintainer: Remy <21974988+xen0bit@users.noreply.github.com>
    description: |-
      Pure-Go userspace VPN — server (responder) and client (initiator).
      `veepin connect` / `veepin serve` speak IKEv2: the full RFC 7296 handshake
      with PSK / EAP-MSCHAPv2 auth, NAT traversal, configuration mode, and a
      userspace ESP-in-UDP data path over TUN.
    license: MIT
    formats: [deb, rpm, apk]
    bindir: /usr/bin
    # `veepin connect` and `veepin serve` open a TUN device / edit routes and
    # need CAP_NET_ADMIN. Packaging can't grant file capabilities portably, so
    # the shipped systemd template unit grants them as ambient capabilities
    # instead (veepin@.service); running the binary by hand still needs root
    # or `setcap cap_net_admin+ep`.
    scripts:
      postinstall: packaging/postinstall.sh
      postremove: packaging/postremove.sh
    contents:
      - src: README.md
        dst: /usr/share/doc/veepin/README.md
      - src: packaging/veepin@.service
        dst: /usr/lib/systemd/system/veepin@.service
      - src: packaging/veepin.conf.example
        dst: /usr/share/doc/veepin/veepin.conf.example

# ---------------------------------------------------------------------------
# Checksums, signing hook (optional), snapshots, changelog, release.
# ---------------------------------------------------------------------------
checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999

release:
  github:
    owner: xen0bit
    name: veepin
  draft: false
  prerelease: auto
  name_template: "v{{ .Version }}"
  footer: |
    ---
    Built with GoReleaser. See the README for setup, `-setcap`/CAP_NET_ADMIN
    requirements, and OS-client configuration.
