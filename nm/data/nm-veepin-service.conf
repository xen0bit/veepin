<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<!--
  D-Bus system-bus policy for the veepin NetworkManager VPN plugin service.
  Only root may own the service name (NetworkManager spawns it as root); any
  client may send to it, matching how the stock NM VPN plugins are policed.
  Install to /usr/share/dbus-1/system.d/.
-->
<busconfig>
  <policy user="root">
    <allow own="org.freedesktop.NetworkManager.veepin"/>
    <allow send_destination="org.freedesktop.NetworkManager.veepin"/>
    <allow send_interface="org.freedesktop.NetworkManager.VPN.Plugin"/>
  </policy>
  <policy context="default">
    <deny own="org.freedesktop.NetworkManager.veepin"/>
    <allow send_destination="org.freedesktop.NetworkManager.veepin"/>
    <allow send_interface="org.freedesktop.NetworkManager.VPN.Plugin"/>
  </policy>
</busconfig>
